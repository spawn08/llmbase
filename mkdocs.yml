site_name: LLMBase
site_description: A Ground-Up Guide to Large Language Models for Engineers
site_author: Amarsingh Thakur
site_url: https://spawn08.github.io/llmbase/
repo_url: https://github.com/spawn08/llmbase
repo_name: spawn08/llmbase
copyright: Copyright &copy; 2026 LLMBase contributors

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

extra_css:
  - assets/css/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spawn08/llmbase

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Part 1 - Foundations:
    - 01_foundations/index.md
    - 1.1 Language Modeling Basics: 01_foundations/language_modeling_basics.md
    - 1.2 Word Embeddings: 01_foundations/word_embeddings.md
    - 1.3 Neural Language Models: 01_foundations/neural_language_models.md
    - 1.4 Sequence-to-Sequence: 01_foundations/sequence_to_sequence.md
    - 1.5 Information Theory: 01_foundations/information_theory.md
    - 1.6 Mathematics of Attention: 01_foundations/attention_math.md
  - Part 2 - Core Architectures:
    - 02_core_architectures/index.md
  - Part 3 - Training & Alignment:
    - 03_training/index.md
  - Part 4 - Inference & Serving:
    - 04_inference/index.md
  - Part 5 - Advanced Topics:
    - 05_advanced/index.md
  - Part 6 - Top 25 Papers:
    - 06_research_papers/index.md
  - Part 7 - Recent Advances:
    - 07_recent_advances/index.md
