site_name: LLMBase
site_description: A Ground-Up Guide to Large Language Models for Engineers
site_author: Amarsingh Thakur
repo_url: https://github.com/spawn08/llmbase

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Part 1 - Foundations:
    - 01_foundations/index.md
  - Part 2 - Core Architectures:
    - 02_core_architectures/index.md
  - Part 3 - Training & Alignment:
    - 03_training/index.md
  - Part 4 - Inference & Serving:
    - 04_inference/index.md
  - Part 5 - Advanced Topics:
    - 05_advanced/index.md
  - Part 6 - Top 25 Papers:
    - 06_research_papers/index.md
  - Part 7 - Recent Advances:
    - 07_recent_advances/index.md
