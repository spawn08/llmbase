site_name: LLMBase
site_description: A Ground-Up Guide to Large Language Models for Engineers
site_author: Amarsingh Thakur
site_url: https://spawn08.github.io/llmbase/
repo_url: https://github.com/spawn08/llmbase
repo_name: spawn08/llmbase
copyright: Copyright &copy; 2026 LLMBase contributors

theme:
  name: material
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    logo: material/brain
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

extra_css:
  - assets/css/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spawn08/llmbase

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
      toc_depth: 3

nav:
  - Home: index.md
  - Interview Questions: interview_questions.md
  - Deep Learning Fundamentals:
    - 00_prerequisites/index.md
    - The Perceptron and Feedforward Networks: 00_prerequisites/01_perceptron_and_ffn.md
    - Activation Functions: 00_prerequisites/02_activation_functions.md
    - Backpropagation and Gradient Descent: 00_prerequisites/03_backpropagation.md
    - Loss Functions and Regularization: 00_prerequisites/04_loss_and_regularization.md
    - Convolutional Neural Networks: 00_prerequisites/05_convolutional_neural_networks.md
    - Sequence Modeling and RNNs: 00_prerequisites/06_sequence_modeling_and_rnns.md
    - The Encoder-Decoder Paradigm: 00_prerequisites/07_encoder_decoder_paradigm.md
  - Foundations:
    - 01_foundations/index.md
    - Language Modeling: 01_foundations/language_modeling_basics.md
    - Word Embeddings: 01_foundations/word_embeddings.md
    - Neural Language Models: 01_foundations/neural_language_models.md
    - Sequence-to-Sequence: 01_foundations/sequence_to_sequence.md
    - Information Theory: 01_foundations/information_theory.md
    - Attention Mathematics: 01_foundations/attention_math.md
  - Core Architectures:
    - 02_core_architectures/index.md
    - The Transformer: 02_core_architectures/transformer.md
    - Self-Attention and MHA: 02_core_architectures/self_attention_mha.md
    - Positional Encoding: 02_core_architectures/positional_encoding.md
    - GPT Decoder-Only: 02_core_architectures/gpt_decoder_only.md
    - BERT Encoder-Only: 02_core_architectures/bert_encoder_only.md
    - T5 Encoder-Decoder: 02_core_architectures/t5_encoder_decoder.md
    - Mixture of Experts: 02_core_architectures/mixture_of_experts.md
    - State Space Models: 02_core_architectures/state_space_models.md
  - Training and Alignment:
    - 03_training/index.md
    - Pre-training at Scale: 03_training/pretraining.md
    - Distributed Training: 03_training/distributed_training.md
    - Mixed Precision and Quantization: 03_training/mixed_precision.md
    - Instruction Tuning and SFT: 03_training/instruction_tuning.md
    - RLHF and DPO: 03_training/rlhf.md
    - Constitutional AI: 03_training/constitutional_ai.md
    - Parameter-Efficient Fine-Tuning: 03_training/peft.md
  - Inference and Serving:
    - 04_inference/index.md
    - Decoding Strategies: 04_inference/decoding_strategies.md
    - KV Cache: 04_inference/kv_cache.md
    - Speculative Decoding: 04_inference/speculative_decoding.md
    - Continuous Batching: 04_inference/continuous_batching.md
    - Quantization for Inference: 04_inference/quantization_inference.md
    - LLM Serving Systems: 04_inference/serving_systems.md
  - Advanced Topics:
    - 05_advanced/index.md
    - RAG: 05_advanced/rag.md
    - Agents and Tool Use: 05_advanced/agents.md
    - Long-Context Modeling: 05_advanced/long_context.md
    - Multimodal LLMs: 05_advanced/multimodal.md
    - Emergent Capabilities: 05_advanced/emergent_capabilities.md
    - Evaluation and Benchmarking: 05_advanced/evaluation.md
    - Hallucination and Safety: 05_advanced/hallucination_safety.md
  - Top 25 Papers:
    - 06_research_papers/index.md
  - Recent Advances:
    - 07_recent_advances/index.md
